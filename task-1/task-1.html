<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>task-1</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        height: 100vh;
        align-items: center;
        background: #242121;
      }
      .movieCard {
        justify-self: center;
        width: 200px;
        border-radius: 10px;
        overflow: hidden;
        background: #111;
        color: #fff;
        font-family: sans-serif;
        transition: transform 0.3s ease;
        cursor: pointer;
      }

      .movieCard:hover {
        transform: scale(1.05);
      }

      .moviePoster {
        position: relative;
      }

      .moviePoster img {
        width: 100%;
        display: block;
      }

      .movieInfo {
        padding: 10px;
      }

      .movieTitle {
        font-size: 16px;
        margin: 0;
      }

      .movieYear {
        font-size: 12px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="container" id="app"></div>

    <script type="text/babel">
      const container = document.getElementById('app');

      const MovieCart = ({ name, image, year }) => (
        <div className="movieCard">
          <div className="moviePoster">
            <img src={image} alt={name} />
          </div>

          <div className="movieInfo">
            <h3 className="movieTitle">{name}</h3>
            <span className="movieYear">{year}</span>
          </div>
        </div>
      );

      const MovieRender = () => {
        const movieData = [
          {
            id: 1,
            name: '1+1',
            image: '../image/1+1.webp',
            year: 2011,
          },
          {
            id: 2,
            name: 'Fight Club',
            image: '../image/FightClub.webp',
            year: 1999,
          },
          {
            id: 3,
            name: 'Green Book',
            image: '../image/GreenBook.webp',
            year: 2018,
          },
          {
            id: 4,
            name: 'Interstellar',
            image: '../image/Interstellar.webp',
            year: 2014,
          },
        ];
        return movieData.map((item) => (
          <MovieCart
            name={item.name}
            year={item.year}
            image={item.image}
            key={item.id}
          />
        ));
      };

      ReactDOM.createRoot(container).render(<MovieRender />);
    </script>
  </body>
</html>
